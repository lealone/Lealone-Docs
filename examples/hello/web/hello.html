<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Service</title>
</head>
<body>
    <div>
        say hello: <input type="text" id="nameInput" value="zhh">
        <button onclick="callSayHello()">submit</button>
        <div id="result"></div>
    </div>

    <script>
        async function callSayHello() {
            const name = document.getElementById('nameInput').value;
            try {
                const response = await fetch(`/service/hello_service/say_hello?name=${encodeURIComponent(name)}`);
                const data = await response.text();
                document.getElementById('result').innerText = data;
            } catch (error) {
                document.getElementById('result').innerText = '请求失败：' + error.message;
            }
        }
    </script>
</body>
</html>
