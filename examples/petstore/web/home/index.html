<template id="category-list">
<div id="category-list">
    <template v-for="category in categories">
    <table width="100%" border="0" cellspacing="0" cellpadding="10">
      <tr>
        <td><template v-if="category.logo"><img v-bind:src="'/store/img/' + category.logo"></template></td>
        <td width="100%">
          <div class="categoryName">{{ category.name }}</div>
          <div class="subcategoryName">
          <template v-for="(product, index) in category.ProductList">
            <template v-if="index != 0"> | </template>
            <a href="/" v-bind:title="product.descn" @click.prevent="lealone.route('home', 'item-list', [product.productid], 'getAllProductItems')">
              {{ product.name }}
            </a>
          </template>
          </div>
        </td>
      </tr>
    </table>
    </template>
</div>
</template>
<template id="item-list">
<div id="item-list">
<table width="100%" border="0" cellspacing="0" cellpadding="10">
  <tr>
    <td rowspan="2" width="1%"><template v-if="category.logo"><img v-bind:src="'/store/img/' + category.logo"></template></td>
    <td class="categoryName">{{ category.name }}</td>
  </tr>
  <tr>
    <td colspan="2" class="subcategoryName">{{ product.name }} - {{ product.descn }}
        <template v-if="itemAdded">
            | <span class="errorMessage">已加入购物车，您可以 [<a href="/" @click.prevent="lealone.route('home', 'category-list')">继续购物</a>]</span>
        </template>
    </td>
  </tr>
  <tr>
    <td colspan="2">
        <table width="100%" border="0" cellspacing="1" cellpadding="10">
            <tr bgcolor="#DDDDDD">
                <th>ID</th>
                <th>单价</th>
                <th>描述</th>
                <th>库存数量</th>
                <th>&nbsp;</th>
            </tr>
            <template v-for="item in items">
            <tr onmouseenter="this.style.backgroundColor='powderblue'" onmouseleave="this.style.backgroundColor=''">
                <td>{{ item.itemid }}</td>
                <td>{{ item.listprice }}</td>
                <td>{{ item.attr }}1</td>
                <td>{{ item.quantity }}</td>
                <td align="right">
                  <input type="button" value="放到购物车" @click.prevent="addCartItem(item.itemid)"/>
                </td>
            </tr>
            </template>

            <tr bgcolor="#DDDDDD">
                <td colspan="10" align="right">
                    <input type="button" value="继 续 购 物" @click.prevent="lealone.route('home', 'category-list')"/>
                </td>
            </tr>
        </table>
    </td>
  </tr>
</table>
</div>
</template>
<template id="view-cart">
<div id="view-cart">
<table width="100%" border="0" cellspacing="0" cellpadding="10">
  <tr>
    <td class="subcategoryName"><img src="/home/img/cart.png"/> 我的购物车</td>
  </tr>
  <tr>
    <td>
    <form action="/" method="post">
        <table width="100%" border="0" cellspacing="1" cellpadding="10">
            <tr bgcolor="#DDDDDD">
                <th width="1%">图片</th>
                <th>ID</th>
                <th>名称</th>
                <th>描述</th>
                <th>单价</th>
                <th>数量</th>
                <th align="right">小计</th>
                <th>&nbsp;</th>
            </tr>
            <template v-if="items.length == 0">
            <tr>
                <td colspan="10">购物车是空的。</td>
            </tr>
            </template>
            <template v-else>
            <template v-for="(item, index) in items">
            <tr onmouseenter="this.style.backgroundColor='powderblue'" onmouseleave="this.style.backgroundColor=''">
                <td width="1%"><img src="/store/img/bird4.jpg"></td>
                <td>{{ item.itemid }}</td>
                <td>Birds，Great companion for up to 75 years</td>
                <td>{{ item.attr1 }}</td>
                <td>{{ item.listprice }}</td>
                <td>
                  <input type="text" name="_fm.ca.EST-18.q" value="1" size="5" maxlength="5"/>
                </td>
                <td align="right">193.5</td>
                <td align="right">
                  <input type="button" value="删除" @click.prevent="removeItem(cartId, item.itemid)"/>
                </td>
            </tr>
            </template>
            </template>
            <tr>
                <td colspan="6">&nbsp;</td>
                <td align="right"><hr size="1"/><br/>总计：{{ items.length }}</td>
                <td>&nbsp;</td>
            </tr>
        
            <tr bgcolor="#DDDDDD">
                <td colspan="10" align="right">
                    <input type="button" value="继续购物" @click.prevent="lealone.route('home', 'category-list')"/>&nbsp;
                    <input type="button" value="更新购物车" onclick="alert('未实现')"/>&nbsp;
                    <input type="button" value="马上去付款" onclick="alert('支付宝，网上支付，安全快速！'); alert('支付宝，让天下无贼！'); alert('该功能尚未实现！')"/>
                </td>
            </tr>
        </table>
    </form>
    </td>
  </tr>
</table>
</div>
</template>
<template id="login">
<div id="login">
<form action="/" method="post">
  <table border="0" cellpadding="0" cellspacing="10" width="100%" class="box">
    <tr align="center">
      <td><strong>用户登录</strong><br />
        <hr/>
        <div class="errorMessage">{{ errorMessage }}</div>
      </td>
    </tr>
    <tr align="center">
      <td><table border="0" cellpadding="0" cellspacing="10" width="10">
        <tr>
          <td nowrap="nowrap">用户名：</td>
          <td width="100%">
            <input type="text" v-model="userId"/>
          </td>
          <td class="errorMessage"></td>
        </tr>
        <tr>
          <td nowrap="nowrap">密码： </td>
          <td>
            <input type="password" v-model="password"/>
          </td>
          <td class="errorMessage"></td>
        </tr>
      </table></td>
    </tr>
    <tr>
      <td><hr/></td>
    </tr>
    <tr align="center">
      <td><table border="0" cellpadding="0" cellspacing="10" width="10">
        <tr>
          <td width="100%">
            <input type="image" src="/home/img/btn_login.png" v-on:click.prevent="login"/>
          </td>
          <td nowrap>
            <a href="/" @click.prevent="lealone.route('user', 'register')">还没有注册过吗？<br>赶快注册！</a>
          </td>
        </tr>
      </table></td>
    </tr>
  </table>
</form>
</div>
</template>

<script src="/home/js/item-list.js"></script>

<script src="/user/js/hooks.js"></script>
<script>
    const app = Lealone.createVueApp("home", "category-list"); 

    app.component('login', UserService, 'login');
    app.component('category-list', StoreService, {initMethod: 'getAllCategories'});
    app.component('item-list', [itemlist, StoreService], {initMethod: 'getAllProductItems'});
    app.component('view-cart', [viewCart, ViewCartService], {bindMethod: '*', initMethod: 'getItems'}); 

    mount(app, '#homeApp');
</script>
